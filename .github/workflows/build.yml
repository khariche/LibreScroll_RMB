name: Build LibreScroll

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.13.0  # Bumped to support @abs

    - name: Compile LibreScroll
      run: |
        zig build-exe main.zig --subsystem windows -O ReleaseSmall

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LibreScroll-Executable
        path: LibreScroll.exe
